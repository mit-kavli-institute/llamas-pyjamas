rule_sets:
  SCIENCE:
    applies_when:
      exposure_type: SCI.R-*
    rules:
    - name: shutter_exptime_consistency
      severity: FAIL
      header_check:
        op: abs_or_rel_diff
        source: SEXPTIME
        other: REXPTIME
        abs_tol: 1.0
        rel_tol: 0.1
    - name: saturation_fraction
      region: full_frame
      metric: saturated_fraction
      per_extension: true
      severity: WARN
      limits:
        max: 0.02
    - name: camera_warming_gradient
      region: full_frame
      metric: background_gradient_rate
      per_extension: true
      severity: WARN
      limits:
        max: 1.3
    - name: ccd_temperature_warm
      severity: WARN
      per_extension: true
      header_check:
        op: range
        per_extension_key:
        - CCDTEMP_1
        - CCDTEMP1
        - CCDTEMP-1
      expected_from_lookup:
        table: temp
        keys:
        - from: extension.name
        min_field: cold_min
        max_field: warn_max
    - name: ccd_temperature_hot
      severity: FAIL
      per_extension: true
      header_check:
        op: range
        per_extension_key:
        - CCDTEMP_1
        - CCDTEMP1
        - CCDTEMP-1
      expected_from_lookup:
        table: temp
        keys:
        - from: extension.name
        max_field: fail_max
    - name: ccd_temperature_shutoff
      severity: FAIL
      per_extension: true
      header_check:
        op: range
        per_extension_key:
        - CCDTEMP_1
        - CCDTEMP1
        - CCDTEMP-1
        limits:
          max: -60.0
