regions:
  full_frame:
    type: full
  bottom_stripe:
    type: rectangle
    x_start: 100
    x_end: 1948
    y_start: 2
    y_end: 28
  top_stripe:
    type: rectangle
    x_start: 100
    x_end: 1948
    y_start: 2020
    y_end: 2046
metrics:
  median:
    type: median
  rms:
    type: std
  saturated_fraction:
    type: fraction_above
    threshold: 63000
  row_banding:
    type: row_structure
  column_banding:
    type: column_structure
verdict_policy:
  fail_if_any_fail: true
  warn_if_any_warn: true
lookup_tables:
  noop:
    placeholder: 1
rule_sets:
  SCIENCE:
    applies_when:
      exposure_type: SCI.R-*
    rules:
    - name: shutter_exptime_consistency
      severity: FAIL
      header_check:
        op: abs_or_rel_diff
        source: SEXPTIME
        other: REXPTIME
        abs_tol: 1.0
        rel_tol: 0.1
    - name: saturation_fraction
      region: full_frame
      metric: saturated_fraction
      per_extension: true
      severity: WARN
      limits:
        max: 0.02
    - name: ccd_temperature_warm
      severity: WARN
      per_extension: true
      header_check:
        op: range
        per_extension_key: CCDTEMP_1
        limits:
          min: -140.0
          max: -73.8
    - name: ccd_temperature_shutoff
      severity: FAIL
      per_extension: true
      header_check:
        op: range
        per_extension_key: CCDTEMP_1
        limits:
          min: -140.0
          max: -60.0
