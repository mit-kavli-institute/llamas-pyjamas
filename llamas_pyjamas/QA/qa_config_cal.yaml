rule_sets:
  BIAS:
    applies_when:
      exposure_type: CAL.R-BIA
    rules:
    - name: shutter_exptime_consistency
      severity: FAIL
      header_check:
        op: abs_or_rel_diff
        source: SEXPTIME
        other: REXPTIME
        abs_tol: 0.214
        rel_tol: 0.1
    - name: edge_background_level
      region: bottom_stripe
      metric: median
      per_extension: true
      severity: WARN
      expected_from_lookup:
        table: edge_bg_BIAS
        keys: &id001
        - from: extension.name
        - from: metadata.readout_mode
        min_field: min
        max_field: max
    - name: frame_level_median
      region: full_frame
      metric: median
      per_extension: true
      severity: WARN
      expected_from_lookup:
        table: level_BIAS
        keys: *id001
        min_field: med_min
        max_field: med_max
    - name: frame_noise_rms
      region: full_frame
      metric: rms
      per_extension: true
      severity: WARN
      expected_from_lookup:
        table: level_BIAS
        keys: *id001
        max_field: rms_max
    - name: row_structure
      region: full_frame
      metric: row_banding
      per_extension: true
      severity: FAIL
      expected_from_lookup:
        table: struct_BIAS
        keys: *id001
        max_field: row_max
    - name: column_structure
      region: full_frame
      metric: column_banding
      per_extension: true
      severity: FAIL
      expected_from_lookup:
        table: struct_BIAS
        keys: *id001
        max_field: col_max
    - name: saturation_fraction
      region: full_frame
      metric: saturated_fraction
      per_extension: true
      severity: FAIL
      expected_from_lookup:
        table: sat_BIAS
        keys: *id001
        max_field: frac_max
    - name: ccd_temperature_warm
      severity: WARN
      per_extension: true
      header_check:
        op: range
        per_extension_key:
        - CCDTEMP_1
        - CCDTEMP1
        - CCDTEMP-1
      expected_from_lookup:
        table: temp
        keys:
        - from: extension.name
        min_field: cold_min
        max_field: warn_max
    - name: ccd_temperature_hot
      severity: FAIL
      per_extension: true
      header_check:
        op: range
        per_extension_key:
        - CCDTEMP_1
        - CCDTEMP1
        - CCDTEMP-1
      expected_from_lookup:
        table: temp
        keys:
        - from: extension.name
        max_field: fail_max
    - name: ccd_temperature_shutoff
      severity: FAIL
      per_extension: true
      header_check:
        op: range
        per_extension_key:
        - CCDTEMP_1
        - CCDTEMP1
        - CCDTEMP-1
        limits:
          max: -60.0
